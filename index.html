<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YukiNyaa Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-slideshow" aria-hidden="true">
      <div class="bg-layer bg-layer-a"></div>
      <div class="bg-layer bg-layer-b"></div>
      <div class="bg-overlay"></div>
    </div>

    <main class="portal" role="main">
      <section class="island" aria-labelledby="intro-title">
        <h1 id="intro-title">설냥이 (yukinyaa/ソルにゃん)</h1>
        <p>
          Welcome to my portal page. Explore my projects, updates, and social
          links from here.
        </p>

        <nav aria-label="Social links">
          <ul class="link-list">
            <li>
              <a
                class="portal-button"
                href="https://x.com/_YukiNyaa"
                target="_blank"
                rel="noopener noreferrer"
                >X</a
              >
            </li>
            <li>
              <a
                class="portal-button"
                href="https://github.com/Yukinyaa"
                target="_blank"
                rel="noopener noreferrer"
                >GitHub</a
              >
            </li>
          </ul>
        </nav>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
